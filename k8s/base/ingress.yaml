apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: messager-ingress
spec:
  ingressClassName: traefik
  rules:
    - host: dev.messager.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
