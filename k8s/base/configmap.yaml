apiVersion: v1
kind: ConfigMap
metadata:
  name: messager-config
data:
  # frontend
  FRONTEND_BFF_URL: ""                       # пусто => браузер ходит на same-origin, nginx проксирует на bff
  FRONTEND_BFF_INTERNAL_URL: "http://bff:8080"
  # порты сервисов
  BFF_HTTP_PORT: "8080"
  USER_HTTP_PORT: "8081"
  MSG_HTTP_PORT: "8082"
  # внутренний service discovery
  USER_SERVICE_URL: "http://user-service:8081"
  MSG_SERVICE_URL: "http://message-service:8082"
  # путь монтирования S3 для файлов сообщений
  MSG_UPLOADS_DIR: "/app/uploads"
  # postgres bootstrap-БД (две прикладные БД создаёт init-db.sh)
  POSTGRES_DB: "messager"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
