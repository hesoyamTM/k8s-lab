# Credentials, которые CSI-драйвер использует для монтирования бакета.
# Должны совпадать с minio-secret (root user/password MinIO).
apiVersion: v1
kind: Secret
metadata:
  name: csi-s3-secret
type: Opaque
stringData:
  accessKeyID: "minioadmin"
  secretAccessKey: "minioadmin123"
  # FQDN обязателен: geesefs монтирует внутри pod CSI-драйвера (namespace kube-system),
  # где короткое имя "minio" не резолвится. Значение для dev (namespace messager).
  # В overlays/prod переопределяется патчем на messager-prod.
  endpoint: "http://minio.messager.svc.cluster.local:9000"
