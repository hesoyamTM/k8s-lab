apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# dev — namespace messager (как в base), реплики по 1, образы latest.
namespace: messager

resources:
  - ../../base
  - s3-pv.yaml

labels:
  - pairs:
      app.kubernetes.io/environment: dev
    includeSelectors: false

images:
  - name: mablinov2704/frontend
    newTag: latest
  - name: mablinov2704/bff
    newTag: latest
  - name: mablinov2704/user-service
    newTag: latest
  - name: mablinov2704/message-service
    newTag: latest
